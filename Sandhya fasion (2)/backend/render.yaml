services:
  - type: web
    name: sandhya-fashion-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/fashion-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
