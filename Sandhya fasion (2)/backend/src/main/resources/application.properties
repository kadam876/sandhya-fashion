# Server (default 8080). Override: mvn spring-boot:run -Dspring-boot.run.arguments=--server.port=8081
# If you see "Port 8080 already in use", another backend instance is running — stop it or use another port.
# Empty PORT env var can break Tomcat bind; main() resets that to 8080.
server.port=${PORT:8080}

# MongoDB Atlas (disables embedded Mongo — see spring.autoconfigure.exclude below)
spring.data.mongodb.uri=mongodb+srv://sandhya_fasion:jayesh123@cluster0.5ajay9u.mongodb.net/sandhya_fashion_db?retryWrites=true&w=majority&appName=Cluster0
spring.data.mongodb.database=sandhya_fashion_db
spring.data.mongodb.auto-index-creation=true

# Do not start Flapdoodle when using Atlas
spring.autoconfigure.exclude=de.flapdoodle.embed.mongo.spring.autoconfigure.EmbeddedMongoAutoConfiguration

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5175,http://localhost:5174,http://localhost:5176,${CORS_ALLOWED_ORIGINS:}

# Logging Configuration
logging.level.com.sandhya.fashion=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.mongodb.driver=INFO

# Platform owner UI — where pending shop-owner signups appear (returned on SHOP_OWNER registration)
app.platform-owner.shops-url=http://localhost:5174/owner/shops

# Spring Configuration
spring.main.allow-circular-refs=true

